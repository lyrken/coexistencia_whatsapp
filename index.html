<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Embedded Signup Coexistencia</title>
</head>
<body>
  <div id="fb-root"></div>

  <button onclick="launchWhatsAppSignup()" style="background-color:#1877f2;border:0;border-radius:4px;color:#fff;cursor:pointer;font-family:Helvetica,Arial,sans-serif;font-size:16px;font-weight:bold;height:40px;padding:0 24px;">
    Iniciar coexistencia con Facebook
  </button>

  <p>Session info response:</p>
  <pre id="session-info-response"></pre>

  <p>SDK response:</p>
  <pre id="sdk-response"></pre>

  <script>
    window.addEventListener('message', (event) => {
      if (event.origin !== "https://www.facebook.com" &&
          event.origin !== "https://web.facebook.com") {
        return;
      }

      try {
        const data = JSON.parse(event.data);

        if (data.type === 'WA_EMBEDDED_SIGNUP') {
          if (data.event === 'FINISH') {
            const { phone_number_id, waba_id } = data.data;
            console.log("Phone number ID:", phone_number_id);
            console.log("WABA ID:", waba_id);
          } else if (data.event === 'CANCEL') {
            const { current_step } = data.data;
            console.warn("Cancelado en:", current_step);
          } else if (data.event === 'ERROR') {
            const { error_message } = data.data;
            console.error("Error:", error_message);
          }
        }

        document.getElementById("session-info-response").textContent =
          JSON.stringify(data, null, 2);
      } catch {
        console.log('Non JSON response', event.data);
      }
    });
  </script>

  <script>
    const fbLoginCallback = (response) => {
      if (response.authResponse) {
        const code = response.authResponse.code;
        console.log("CODE:", code);
      }

      document.getElementById("sdk-response").textContent =
        JSON.stringify(response, null, 2);
    };

    const launchWhatsAppSignup = () => {
      FB.login(fbLoginCallback, {
        config_id: '4142828149313704',
        response_type: 'code',
        override_default_response_type: true,
        extras: {
          featureType: 'whatsapp_business_app_onboarding',
          sessionInfoVersion: '3'
        }
      });
    };
  </script>

  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId: '1593788658535312',
        autoLogAppEvents: true,
        xfbml: true,
        version: 'v25.0'
      });
    };
  </script>

  <script async defer crossorigin="anonymous"
    src="https://connect.facebook.net/en_US/sdk.js">
  </script>
</body>
</html>
